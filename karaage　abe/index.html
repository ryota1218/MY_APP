<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="上流工程サポートツール - 要件定義、システム構成図、UML、画面レイアウト、E-R図、ガントチャートを効率的に作成">
  <title>UpStream | 上流工程サポートツール</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button id="hamburger" class="hamburger" aria-label="メニュー">☰</button>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">▲</span>
      <span>UpStream</span>
    </div>
    <nav>
      <a data-tool="dashboard" class="active"><span class="nav-icon">📊</span><span>ダッシュボード</span></a>
      <a data-tool="proposal"><span class="nav-icon">💡</span><span>技術スタック提案</span></a>
      <a data-tool="requirements"><span class="nav-icon">📋</span><span>要件定義書</span></a>
      <a data-tool="architecture"><span class="nav-icon">🏗️</span><span>システム構成図</span></a>
      <a data-tool="uml"><span class="nav-icon">🔄</span><span>UML・画面遷移図</span></a>
      <a data-tool="layout"><span class="nav-icon">📐</span><span>画面レイアウト</span></a>
      <a data-tool="erdiagram"><span class="nav-icon">🗃️</span><span>E-R図</span></a>
      <a data-tool="gantt"><span class="nav-icon">📅</span><span>ガントチャート</span></a>
    </nav>
    <div class="sidebar-footer">UpStream v1.0 © 2026</div>
  </aside>

  <!-- Main Content — セクションは html/ フォルダから動的に読み込まれます -->
  <main class="main-content" id="main-content">
    <!-- セクションは core.js の loadSections() で挿入されます -->
  </main>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Menu overlay for mobile hamburger -->
  <div id="menu-overlay"></div>

  <script src="js/core.js"></script>
  <script src="js/proposal.js"></script>
  <script src="js/requirements.js"></script>
  <script src="js/diagram.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/erdiagram.js"></script>
  <script src="js/gantt.js"></script>
</body>
</html>
