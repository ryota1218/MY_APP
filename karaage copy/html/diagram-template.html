<!-- Diagram Template -->
<div class="section-header editor-header">
  <div class="editor-header-bar">
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="新規作成" aria-label="新規作成" data-action="clearAll"><i data-lucide="file-plus" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="保存" aria-label="保存"><i data-lucide="save" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="フォルダを開く" aria-label="フォルダを開く"><i data-lucide="folder-open" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="元に戻す" aria-label="元に戻す" data-action="undoLastAction"><i data-lucide="undo-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="やり直す" aria-label="やり直す" data-action="redoLastAction"><i data-lucide="redo-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="コピー" aria-label="コピー"><i data-lucide="copy" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="貼り付け" aria-label="貼り付け"><i data-lucide="clipboard-paste" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="ズームイン" aria-label="ズームイン"><i data-lucide="zoom-in" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="ズームアウト" aria-label="ズームアウト"><i data-lucide="zoom-out" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="全体表示" aria-label="全体表示"><i data-lucide="maximize-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="グリッド表示" aria-label="グリッド表示"><i data-lucide="grid-3x3" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="自動配置" aria-label="自動配置" data-action="autoLayout"><i data-lucide="bot" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="SVGエクスポート" aria-label="SVGエクスポート" data-action="exportSVG"><i data-lucide="download" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="共有" aria-label="共有"><i data-lucide="share-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="ユーザー" aria-label="ユーザー"><i data-lucide="user" class="editor-icon"></i></button>
    </div>
    <div class="editor-header-spacer"></div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="ヘルプ" aria-label="ヘルプ"><i data-lucide="help-circle" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="設定" aria-label="設定"><i data-lucide="settings" class="editor-icon"></i></button>
    </div>
  </div>
</div>
<div class="toolbar architecture-toolbar">
  <div class="toolbar-left-group">
    <div class="diagram-overlay-palette" id="{{prefix}}-palette"></div>
    <button class="btn btn-sm btn-secondary" data-action="clearAll">クリア</button>
    <div class="toolbar-sep"></div>
    <div class="diagram-style-controls" id="{{prefix}}-style-controls">
      <label class="diagram-style-field">
        <span>文字サイズ</span>
        <select id="{{prefix}}-font-size">
          <option value="12">12</option>
          <option value="14" selected>14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
        </select>
      </label>
      <label class="diagram-style-field">
        <span>文字色</span>
        <details class="diagram-color-picker" id="{{prefix}}-text-color-picker">
          <summary class="diagram-color-button" id="{{prefix}}-text-color-btn">
            <span class="diagram-color-sample" id="{{prefix}}-text-color-sample"></span>
            <span class="diagram-color-text" id="{{prefix}}-text-color-text">自動</span>
            <span class="diagram-color-caret">▾</span>
          </summary>
          <div class="diagram-color-menu" id="{{prefix}}-text-color-menu" aria-label="文字色の選択">
            <button type="button" class="diagram-color-auto-row diagram-color-option" data-color="" data-label="自動">
              <span class="diagram-color-option-swatch diagram-color-option-auto"></span>
              <span>自動</span>
            </button>
            <div class="diagram-color-divider"></div>
            <div class="diagram-color-group-label">テーマの色</div>
            <div class="diagram-color-theme-row" id="{{prefix}}-theme-row"></div>
            <div class="diagram-color-shade-grid" id="{{prefix}}-shade-grid"></div>
            <div class="diagram-color-group-label">標準の色</div>
            <div class="diagram-color-standard-row" id="{{prefix}}-standard-row"></div>
            <button type="button" class="diagram-color-other-btn" id="{{prefix}}-other-color-btn">
              <span class="diagram-color-other-icon">🎨</span>
              <span>その他の色(M)...</span>
            </button>
          </div>
        </details>
      </label>
    </div>
    <div class="toolbar-sep"></div>
  </div>
  <div class="toolbar-inline-shapes-group">
    <div class="toolbar-inline-shapes" id="{{prefix}}-inline-shapes"></div>
    <button class="inline-shape-more-btn" id="{{prefix}}-shape-add-btn" data-action="openPaletteMenu" title="すべての図形を表示">
      <i data-lucide="chevron-down" class="editor-icon"></i>
    </button>
  </div>
</div>
<div class="diagram-workspace architecture-workspace" style="position: relative; overflow: hidden; display: flex;">
  <div class="diagram-canvas" id="{{prefix}}-canvas">
    <svg class="connections" id="{{prefix}}-svg"></svg>
  </div>
  
  <!-- プロパティパネル (右からのスライドバー) -->
  <div class="diagram-property-panel" id="{{prefix}}-property-panel">
    <div class="property-panel-header">
      <span class="property-panel-title">プロパティ</span>
      <button class="property-panel-close" data-action="closePropertyPanel"><i data-lucide="x" class="editor-icon"></i></button>
    </div>
    <div class="property-panel-body">
      <div class="property-group">
        <label>ラベル</label>
        <input type="text" id="{{prefix}}-prop-label" class="property-input">
      </div>
      <div class="property-group">
        <label>X座標</label>
        <input type="number" id="{{prefix}}-prop-x" class="property-input">
      </div>
      <div class="property-group">
        <label>Y座標</label>
        <input type="number" id="{{prefix}}-prop-y" class="property-input">
      </div>
      <div class="property-group">
        <label>フォントサイズ</label>
        <input type="number" id="{{prefix}}-prop-fontsize" class="property-input" min="10" max="48">
      </div>
      <div class="property-group">
        <label>文字色</label>
        <input type="color" id="{{prefix}}-prop-textcolor" class="property-input color-input">
      </div>
      <div class="property-group">
        <label>ノード枠色</label>
        <input type="color" id="{{prefix}}-prop-color" class="property-input color-input">
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-routing" style="display:none;">
        <label>ルーティング</label>
        <select id="{{prefix}}-prop-routing" class="property-input">
          <option value="straight">直線</option>
          <option value="orthogonal">直角 (Orthogonal)</option>
          <option value="curve">曲線 (Curve)</option>
        </select>
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-linestyle" style="display:none;">
        <label>線の種類</label>
        <select id="{{prefix}}-prop-linestyle" class="property-input">
          <option value="solid">実線</option>
          <option value="dashed">点線</option>
        </select>
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-fragment" style="display:none;">
        <label>フラグメント種類</label>
        <select id="{{prefix}}-prop-fragtype" class="property-input">
          <option value="alt">alt (条件分岐)</option>
          <option value="opt">opt (任意実行)</option>
          <option value="loop">loop (繰り返し)</option>
          <option value="break">break (中断)</option>
          <option value="par">par (並列実行)</option>
          <option value="critical">critical (排他制御)</option>
          <option value="ref">ref (参照)</option>
        </select>
        <label style="margin-top: 8px; display: block;">詳細ラベル</label>
        <input type="text" id="{{prefix}}-prop-fraglabel" class="property-input" placeholder="例: [score > 80]">
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-timing" style="display:none;">
        <label>状態/値</label>
        <select id="{{prefix}}-prop-timingval" class="property-input">
          <option value="High">High (ON)</option>
          <option value="Low">Low (OFF)</option>
          <option value="Other">その他...</option>
        </select>
        <input type="text" id="{{prefix}}-prop-timingtext" class="property-input" style="margin-top:4px;" placeholder="その他の値を入力">
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-multFrom" style="display:none;">
        <label>多重度 (接続元)</label>
        <input type="text" id="{{prefix}}-prop-multFrom" class="property-input" placeholder="例: 1, 0..1, *, 1..*">
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-multTo" style="display:none;">
        <label>多重度 (接続先)</label>
        <input type="text" id="{{prefix}}-prop-multTo" class="property-input" placeholder="例: 0..*, 1, *">
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-conntype" style="display:none;">
        <label>線の関係性 (UML)</label>
        <select id="{{prefix}}-prop-conntype" class="property-input">
          <option value="association">関連 (Association)</option>
          <option value="dependency">依存 (Dependency)</option>
          <option value="aggregation">集約 (Aggregation)</option>
          <option value="composition">コンポジション (Composition)</option>
          <option value="include">包含 (&lt;&lt;include&gt;&gt;)</option>
          <option value="extend">拡張 (&lt;&lt;extend&gt;&gt;)</option>
        </select>
      </div>
      <div class="property-group" id="{{prefix}}-prop-group-zindex">
        <label>重なり順 (Z-Index)</label>
        <div style="display:flex; gap: 8px;">
          <button class="btn btn-sm btn-secondary" style="flex:1;" data-action="bringToFront">最前面へ</button>
          <button class="btn btn-sm btn-secondary" style="flex:1;" data-action="sendToBack">最背面へ</button>
        </div>
      </div>
      <button class="btn btn-sm btn-danger" data-action="deleteSelected" style="width: 100%; margin-top: 16px;">削除</button>
  </div>
</div>
