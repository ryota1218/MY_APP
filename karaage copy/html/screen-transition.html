<!-- 画面遷移図 -->
<div class="section-header">
  <h1>画面遷移図</h1>
  <p>アプリケーションの画面フローとユーザー操作の遷移を視覚的に設計します</p>
</div>
<div class="toolbar architecture-toolbar">
  <div class="toolbar-left-group">
    <span class="toolbar-title">画面遷移エディタ</span>
    <div class="diagram-overlay-palette" id="st-palette"></div>
    <div class="diagram-style-controls" id="st-style-controls">
      <label class="diagram-style-field">
        <span>文字サイズ</span>
        <select id="st-font-size">
          <option value="12">12</option>
          <option value="14" selected>14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
        </select>
      </label>
      <label class="diagram-style-field">
        <span>文字色</span>
        <details class="diagram-color-picker" id="st-text-color-picker">
          <summary class="diagram-color-button" id="st-text-color-btn">
            <span class="diagram-color-sample" id="st-text-color-sample"></span>
            <span class="diagram-color-text" id="st-text-color-text">自動</span>
            <span class="diagram-color-caret">▾</span>
          </summary>
          <div class="diagram-color-menu" id="st-text-color-menu" aria-label="文字色の選択">
            <button type="button" class="diagram-color-auto-row diagram-color-option" data-color="" data-label="自動">
              <span class="diagram-color-option-swatch diagram-color-option-auto"></span>
              <span>自動</span>
            </button>
            <div class="diagram-color-divider"></div>
            <div class="diagram-color-group-label">テーマの色</div>
            <div class="diagram-color-theme-row" id="st-theme-row"></div>
            <div class="diagram-color-shade-grid" id="st-shade-grid"></div>
            <div class="diagram-color-group-label">標準の色</div>
            <div class="diagram-color-standard-row" id="st-standard-row"></div>
            <button type="button" class="diagram-color-other-btn" id="st-other-color-btn">
              <span class="diagram-color-other-icon">🎨</span>
              <span>その他の色(M)...</span>
            </button>
          </div>
        </details>
      </label>
    </div>
  </div>
  <div class="toolbar-spacer"></div>
  <button class="btn btn-sm btn-secondary" onclick="app.screenTransition.clearAll()">🗑 クリア</button>
  <button class="btn btn-sm btn-secondary" onclick="app.screenTransition.undoLastAction()">↩ 一つ戻る</button>
  <button class="btn btn-sm btn-secondary" onclick="app.screenTransition.redoLastAction()">↪ 一つ先に戻る</button>
  <button class="btn btn-sm btn-secondary" onclick="app.screenTransition.autoLayout()">📐 自動配置</button>
  <div class="toolbar-sep"></div>
  <button class="btn btn-sm btn-primary" onclick="app.screenTransition.exportSVG()">📥 SVGエクスポート</button>
</div>
<div class="diagram-workspace architecture-workspace">
  <div class="diagram-canvas" id="st-canvas">
    <svg class="connections" id="st-svg"></svg>
  </div>
</div>
