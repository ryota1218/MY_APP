<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | UpStream</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    body {
      margin: 0;
    }
    .login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }
    .toggle-auth {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }
    .toggle-auth a {
      color: #8b5cf6;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <i data-lucide="triangle"></i>
        <span>UpStream</span>
      </div>
      <h2 id="auth-title">ログイン</h2>
      <p id="auth-desc">UpStream アカウントにログインしてください</p>
    </div>

    <!-- ログインフォーム -->
    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="username">メールアドレス</label>
        <input type="email" id="username" class="form-input" placeholder="admin@example.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" class="form-input" placeholder="password" required autocomplete="current-password">
      </div>
      <div id="login-error" class="login-error-message"></div>
      <button type="submit" class="btn btn-primary btn-block">ログイン</button>
      <div class="toggle-auth">
        アカウントをお持ちでないですか？ <a id="show-register">新規登録</a>
      </div>
    </form>

    <!-- 新規登録フォーム -->
    <form id="register-form" class="login-form" style="display: none;">
      <div class="form-group">
        <label for="reg-email">メールアドレス</label>
        <input type="email" id="reg-email" class="form-input" placeholder="user@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">パスワード</label>
        <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div id="register-error" class="login-error-message"></div>
      <button type="submit" class="btn btn-primary btn-block">アカウント作成</button>
      <div class="toggle-auth">
        既にアカウントをお持ちですか？ <a id="show-login">ログイン</a>
      </div>
    </form>

    <div class="login-footer">
      <p>プロトタイプ用アカウント: <code>admin@example.com</code> / <code>password</code></p>
    </div>
  </div>
</div>

  <script src="../js/auth.js"></script>
  <script>
    // アイコンを表示用に生成
    lucide.createIcons();

    // 表示の切り替えロジック
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authTitle = document.getElementById('auth-title');
    const authDesc = document.getElementById('auth-desc');

    document.getElementById('show-register').onclick = () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      authTitle.textContent = '新規登録';
      authDesc.textContent = '新しいアカウントを作成してください';
    };

    document.getElementById('show-login').onclick = () => {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      authTitle.textContent = 'ログイン';
      authDesc.textContent = 'UpStream アカウントにログインしてください';
    };

    // 既にログイン済みの場合はトップページへリダイレクト
    if (localStorage.getItem('upstream_user')) {
      window.location.href = '../index.html';
    }
  </script>
</body>
</html>
