<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画像一覧</title>

    <!-- CSS読み込み -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<h1>Supabase Images</h1>

<div class="container">

    {% for item in images %}

        <div class="card">

            <img src="{{ item.image_url }}">

            <p>{{ item.name }}</p>

        </div>

    {% endfor %}

</div>

</body>
</html>
