<style>
  .layout-canvas.grid-active {
    background-image: radial-gradient(circle, var(--grid-dot-color, rgba(128, 128, 128, 0.15)) 1.5px, transparent 1.5px);
    background-size: 20px 20px;
  }
</style>
<script>
  // index.htmlを経由せず直接開かれた場合は、メイン画面へリダイレクト
  if (!window.app) window.location.href = '../index.html?tool=layout';
</script>
<!-- Layout -->
<div class="section-header editor-header">
  <div class="editor-header-bar">
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="新規作成" aria-label="新規作成" data-action="clearAll"><i data-lucide="file-plus" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="開く" aria-label="開く" data-action="openDiagramModal"><i data-lucide="folder-open" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="保存" aria-label="保存" data-action="saveDiagram"><i data-lucide="save" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="元に戻す" aria-label="元に戻す" data-action="undoLastAction"><i data-lucide="undo-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="やり直す" aria-label="やり直す" data-action="redoLastAction"><i data-lucide="redo-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="コピー" aria-label="コピー" data-action="copySelected"><i data-lucide="copy" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="貼り付け" aria-label="貼り付け" data-action="pasteSelected"><i data-lucide="clipboard-paste" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="ズームイン" aria-label="ズームイン" data-action="zoomIn"><i data-lucide="zoom-in" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="ズームアウト" aria-label="ズームアウト" data-action="zoomOut"><i data-lucide="zoom-out" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="全体表示" aria-label="全体表示" data-action="resetZoom"><i data-lucide="maximize-2" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
      <div class="editor-header-group">
        <button class="editor-header-btn ai-layout-btn" data-label="AI自動配置" aria-label="AI自動配置" data-action="aiAutoLayout"><i data-lucide="sparkles" class="editor-icon"></i></button>
        <button class="editor-header-btn ai-chat-toggle-btn" data-label="AIチャットアシスタント" aria-label="AIチャットアシスタント" data-action="toggleAIChat"><i data-lucide="message-square" class="editor-icon"></i></button>
      </div>
    </div>
    <div class="editor-header-spacer"></div>
  </div>
</div>
<div class="toolbar layout-toolbar">
  <div class="toolbar-left-group">
  </div>

  <!-- 下部バーから移動してきたキャンバス設定グループ -->
  <div class="toolbar-config-group">
    <div class="statusbar-group">
      <button class="statusbar-preset active" data-preset="free" title="フリーサイズ">
        <i data-lucide="maximize" class="statusbar-icon"></i>
      </button>
      <button class="statusbar-preset" data-preset="desktop" title="PC (1920×1080)">
        <i data-lucide="monitor" class="statusbar-icon"></i>
      </button>
      <button class="statusbar-preset" data-preset="laptop" title="ノート (1366×768)">
        <i data-lucide="laptop" class="statusbar-icon"></i>
      </button>
      <button class="statusbar-preset" data-preset="tablet" title="タブレット (768×1024)">
        <i data-lucide="tablet" class="statusbar-icon"></i>
      </button>
      <button class="statusbar-preset" data-preset="mobile" title="スマホ (375×812)">
        <i data-lucide="smartphone" class="statusbar-icon"></i>
      </button>
    </div>


  </div>

  <div class="toolbar-inline-shapes-group" style="position: relative; display: flex; align-items: center; gap: 8px;">
    <div class="toolbar-inline-shapes" id="layout-inline-shapes"></div>
    <button class="inline-shape-more-btn" id="layout-shape-add-btn" data-action="togglePaletteDropdown" title="すべてのUI要素を表示">
      <i data-lucide="chevron-down" class="editor-icon"></i>
    </button>
    <!-- ▼ボタンから出るUI要素ドロップダウン -->
    <div class="layout-palette-dropdown" id="layout-palette-dropdown" style="position: absolute; right: 0; top: 100%; z-index: 1000; margin-top: 8px; display: none;"></div>
  </div>
</div>
<div class="diagram-workspace layout-workspace-wrap" style="background: var(--bg-primary);">
  <div class="layout-canvas-container" id="layout-canvas-container">
    <div class="layout-canvas grid-active" id="layout-canvas"></div>
  </div>

  <div class="diagram-property-panel" id="layout-property-panel">
    <div class="property-panel-header">
      <span class="property-panel-title">プロパティ</span>
      <button class="property-panel-close" data-action="closePropertyPanel"><i data-lucide="x" class="editor-icon"></i></button>
    </div>
    <div class="property-panel-body">
      <div class="property-group">
        <label>名前</label>
        <input type="text" id="layout-prop-label" class="property-input">
      </div>
      <div class="property-group">
        <label>幅</label>
        <input type="number" id="layout-prop-w" class="property-input" min="40">
      </div>
      <div class="property-group">
        <label>高さ</label>
        <input type="number" id="layout-prop-h" class="property-input" min="30">
      </div>
      <div class="property-group">
        <label>フォントサイズ</label>
        <input type="number" id="layout-prop-fontsize" class="property-input" min="10" max="72">
      </div>
      <div class="property-group">
        <label>文字色</label>
        <input type="color" id="layout-prop-textcolor" class="property-input color-input">
      </div>
      <div class="property-group">
        <label>背景色</label>
        <input type="color" id="layout-prop-bg" class="property-input color-input">
      </div>
      <div class="property-group">
        <label>Z順序</label>
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
          <button class="btn btn-sm btn-secondary" id="layout-zindex-forward" style="flex: 1;" title="1段階前へ移動">
            <i data-lucide="arrow-up" style="width: 16px; height: 16px; margin-right: 4px;"></i>前面
          </button>
          <button class="btn btn-sm btn-secondary" id="layout-zindex-backward" style="flex: 1;" title="1段階後ろへ移動">
            <i data-lucide="arrow-down" style="width: 16px; height: 16px; margin-right: 4px;"></i>背面
          </button>
        </div>
      </div>
      <button class="btn btn-sm btn-danger" data-action="deleteSelected" style="width: 100%; margin-top: 16px;">要素を削除</button>
    </div>
  </div>

  <!-- AIチャットアシスタントパネル -->
  <div class="diagram-ai-chat-panel" id="layout-ai-chat-panel">
    <div class="ai-chat-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <i data-lucide="bot" class="ai-chat-bot-icon"></i>
        <span class="ai-chat-title">Layout AIアシスタント</span>
      </div>
      <button class="ai-chat-close" data-action="toggleAIChat"><i data-lucide="x" class="editor-icon"></i></button>
    </div>
    <div class="ai-chat-messages" id="layout-ai-chat-messages">
      <div class="ai-chat-msg assistant">
        <div class="ai-chat-bubble">
          こんにちは！Layout AIアシスタントです。画面レイアウトや構成の最適化をお手伝いします。<br><br>
          <strong>【できることの例】</strong>
          <ul>
            <li>「ログイン画面の標準的なレイアウトを組んで」</li>
            <li>「ヘッダーとサイドバー、メインコンテンツの配置を整えて」</li>
            <li>「ボタンを右下に揃えて」</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="ai-chat-input-container">
      <div class="ai-chat-meta-row">
        <span class="ai-chat-meta-left"><i data-lucide="check" class="icon-xs" style="color:#10b981; width:12px; height:12px;"></i> レイアウト準備完了</span>
        <span class="ai-chat-meta-right">Canvas Active</span>
      </div>
      <div class="ai-chat-input-box">
        <textarea class="ai-chat-input" id="layout-ai-chat-input" placeholder="AIへの指示を入力... (例: 'ログイン画面のレイアウトを組んで')"></textarea>
        <div class="ai-chat-input-footer">
          <div class="ai-chat-model-selector">
            <span>✨ Gemini 2.5 Flash</span>
            <i data-lucide="chevron-up" class="icon-xs" style="margin-left: 2px; width:12px; height:12px;"></i>
          </div>
          <button class="ai-chat-send-btn" id="layout-ai-chat-send-btn" title="送信">
            <i data-lucide="arrow-up" class="send-icon"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
