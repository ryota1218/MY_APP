<style>
  .diagram-canvas.grid-active {
    background-image: radial-gradient(circle, var(--grid-dot-color, rgba(128, 128, 128, 0.15)) 1.5px, transparent 1.5px);
    background-size: 20px 20px;
  }
</style>
<script>
  // index.htmlを経由せず直接開かれた場合は、メイン画面へリダイレクト
  if (!window.app) window.location.href = '../index.html?tool=erdiagram';
</script>
<!-- ER Diagram -->
<div class="section-header editor-header">
  <div class="editor-header-bar">
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="新規作成" aria-label="新規作成" data-action="clearAll"><i data-lucide="file-plus" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="開く" aria-label="開く" data-action="openDiagramModal"><i data-lucide="folder-open" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="保存" aria-label="保存" data-action="saveDiagram"><i data-lucide="save" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="元に戻す" aria-label="元に戻す" data-action="undoLastAction"><i data-lucide="undo-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="やり直す" aria-label="やり直す" data-action="redoLastAction"><i data-lucide="redo-2" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="コピー" aria-label="コピー" data-action="copySelected"><i data-lucide="copy" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="貼り付け" aria-label="貼り付け" data-action="pasteSelected"><i data-lucide="clipboard-paste" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn" data-label="ズームイン" aria-label="ズームイン" data-action="zoomIn"><i data-lucide="zoom-in" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="ズームアウト" aria-label="ズームアウト" data-action="zoomOut"><i data-lucide="zoom-out" class="editor-icon"></i></button>
      <button class="editor-header-btn" data-label="全体表示" aria-label="全体表示" data-action="resetZoom"><i data-lucide="maximize-2" class="editor-icon"></i></button>
      <div class="editor-header-sep"></div>
    </div>
    <div class="editor-header-group">
      <button class="editor-header-btn ai-layout-btn" data-label="AI自動配置" aria-label="AI自動配置" data-action="aiAutoLayout"><i data-lucide="sparkles" class="editor-icon"></i></button>
      <button class="editor-header-btn ai-chat-toggle-btn" data-label="AIチャットアシスタント" aria-label="AIチャットアシスタント" data-action="toggleAIChat"><i data-lucide="message-square" class="editor-icon"></i></button>
    </div>
    <div class="editor-header-spacer"></div>
  </div>
</div>
<div class="toolbar er-toolbar">
  <div class="toolbar-left-group">
    <div class="diagram-overlay-palette" id="er-palette" style="position: static; width: auto; padding: 0; background: none; border: none; display: flex; align-items: center; gap: 8px;">
      <button type="button" class="palette-action-btn sidebar-toggle-btn" data-action="toggleSidebar" title="サイドバー表示切替" style="width: 38px; margin-top: 0;">☰</button>
    </div>
    <button class="btn btn-sm btn-secondary" data-action="addEntity">＋ エンティティ追加</button>
    <button class="btn btn-sm btn-secondary" data-action="addRelation">🔗 リレーション追加</button>
    <button class="btn btn-sm btn-secondary" data-action="clearAll">🗑 クリア</button>
  </div>
</div>
<div class="diagram-workspace er-workspace" style="position: relative; overflow: hidden; display: flex;">
  <div class="diagram-canvas grid-active" id="er-canvas" style="height:calc(100vh - 240px); flex: 1;">
    <svg class="connections" id="er-svg"></svg>
  </div>

  <!-- プロパティパネル (右からのスライドバー) -->
  <div class="diagram-property-panel" id="er-property-panel">
    <div class="property-panel-header">
      <span class="property-panel-title">エンティティ プロパティ</span>
      <button class="property-panel-close" data-action="closePropertyPanel"><i data-lucide="x" class="editor-icon"></i></button>
    </div>
    <div class="property-panel-body">
      <div class="property-group" id="er-prop-group-node-only">
        <div class="property-group">
          <label>テーブル名</label>
          <input type="text" id="er-prop-label" class="property-input">
        </div>
        <div style="display:flex; gap: 8px; margin-bottom: 12px;">
          <div class="property-group" style="flex:1; margin-bottom: 0;">
            <label>X座標</label>
            <input type="number" id="er-prop-x" class="property-input">
          </div>
          <div class="property-group" style="flex:1; margin-bottom: 0;">
            <label>Y座標</label>
            <input type="number" id="er-prop-y" class="property-input">
          </div>
        </div>
        <div class="property-group">
          <label>フォントサイズ</label>
          <input type="number" id="er-prop-fontsize" class="property-input" min="10" max="48" value="14">
        </div>
        <div class="property-group">
          <label>文字色</label>
          <input type="color" id="er-prop-textcolor" class="property-input color-input">
        </div>
        <div class="property-group">
          <label>テーブル色 / 枠線</label>
          <input type="color" id="er-prop-color" class="property-input color-input">
        </div>
        <div class="property-group">
          <label>重なり順 (Z-Index)</label>
          <div style="display:flex; gap: 8px;">
            <button class="btn btn-sm btn-secondary" style="flex:1;" data-action="bringToFront">最前面へ</button>
            <button class="btn btn-sm btn-secondary" style="flex:1;" data-action="sendToBack">最背面へ</button>
          </div>
        </div>
      </div>
      
      <div class="property-group" id="er-prop-group-conn-only" style="display:none;">
        <div class="property-group">
          <label>リレーション名</label>
          <input type="text" id="er-prop-conn-label" class="property-input" placeholder="例: 注文する">
        </div>
        <div class="property-group">
          <label>多重度 (From)</label>
          <input type="text" id="er-prop-multFrom" class="property-input" placeholder="例: 1">
        </div>
        <div class="property-group">
          <label>多重度 (To)</label>
          <input type="text" id="er-prop-multTo" class="property-input" placeholder="例: 0..*">
        </div>
      </div>

      <button class="btn btn-sm btn-danger" data-action="deleteSelected" style="width: 100%; margin-top: 16px;">削除</button>
    </div>
  </div>

  <!-- AIチャットアシスタントパネル -->
  <div class="diagram-ai-chat-panel" id="er-ai-chat-panel">
    <div class="ai-chat-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <i data-lucide="bot" class="ai-chat-bot-icon"></i>
        <span class="ai-chat-title">ER設計 AIアシスタント</span>
      </div>
      <button class="ai-chat-close" data-action="toggleAIChat"><i data-lucide="x" class="editor-icon"></i></button>
    </div>
    <div class="ai-chat-messages" id="er-ai-chat-messages">
      <div class="ai-chat-msg assistant">
        <div class="ai-chat-bubble">
          こんにちは！ER設計 AIアシスタントです。データベース設計の効率化をお手伝いします。<br><br>
          <strong>【できることの例】</strong>
          <ul>
            <li>「ECサイトに必要なテーブル構成を提案して」</li>
            <li>「ユーザーテーブルにメールアドレスとパスワードを追加して」</li>
            <li>「テーブル同士のリレーションを最適化して」</li>
            <li>「この構成からMySQL用のDDLを生成して」</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="ai-chat-input-container">
      <div class="ai-chat-meta-row">
        <span class="ai-chat-meta-left"><i data-lucide="check" class="icon-xs" style="color:#10b981; width:12px; height:12px;"></i> レイアウト準備完了</span>
        <span class="ai-chat-meta-right">Canvas Active</span>
      </div>
      <div class="ai-chat-input-box">
        <textarea class="ai-chat-input" id="er-ai-chat-input" placeholder="AIへの指示を入力... (例: 'ECサイトのテーブル構成を提案して')"></textarea>
        <div class="ai-chat-input-footer">
          <div class="ai-chat-model-selector">
            <span>✨ Gemini 2.5 Flash</span>
            <i data-lucide="chevron-up" class="icon-xs" style="margin-left: 2px; width:12px; height:12px;"></i>
          </div>
          <button class="ai-chat-send-btn" id="er-ai-chat-send-btn" title="送信">
            <i data-lucide="arrow-up" class="send-icon"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
