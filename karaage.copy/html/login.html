<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | KaraageFlowChart</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <style>
    .login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
      background: var(--bg-primary);
    }
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      color: var(--text);
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      color: var(--accent);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      padding-right: 40px; /* アイコン用のスペース */
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      outline: none;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 38px;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 24px;
    }
    .password-toggle:hover {
      color: var(--accent);
    }
    .password-strength {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .password-strength-bar {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.16);
      overflow: hidden;
    }
    .password-strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.2s ease, background 0.2s ease;
    }
    .login-error-message {
      color: #ef4444;
      font-size: 0.8rem;
      margin-bottom: 15px;
      min-height: 1.2rem;
    }
    .btn-submit-container {
      display: flex;
      justify-content: center;
      margin: 20px 0 10px;
    }
    .btn-submit-container .btn {
      min-width: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .toggle-auth {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }
    .toggle-auth a {
      color: #8b5cf6;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .login-footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
    }


    /* ブラウザや他のスタイルが強制挿入する右側の目のアイコン（パスワード表示切替）を完全に非表示にする */
  /* 1. ブラウザ（Edge等）が自動挿入するパスワード表示切替アイコンを強制非表示 */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear,
input[type="text"]::-ms-reveal,
input[type="text"]::-ms-clear {
  display: none !important;
  width: 0 !important;
  height: 0 !important;
}

/* 2. もともとHTML側にあった古い方のアイコン（右側に居座っていたもの）だけをピンポイントで非表示 */
#toggle-login-password,
#toggle-reg-password,
#toggle-login-password-deprecated,
#toggle-reg-password-deprecated {
  display: none !important;
}

/* 3. JavaScriptで新しく生成した「左側の正しいアイコン」を絶対に表示する */
[id^="js-toggle-"] {
  display: flex !important;
}
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <i data-lucide="triangle"></i>
        <span>KFC</span>
      </div>
      <h2 id="auth-title">ログイン</h2>
      <p id="auth-desc">KFCアカウントにログインしてください</p>
    </div>

    <!-- ログインフォーム -->
    <form id="login-form" class="login-form">
      <!-- 将来的なCSRFトークンの挿入場所 -->
      <div class="form-group">
        <label for="username">メールアドレス</label>
        <input type="email" id="username" class="form-input" placeholder="admin@example.com" required autocomplete="username" maxlength="255">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" class="form-input" placeholder="password" required autocomplete="current-password" minlength="8" maxlength="128">
        <span class="password-toggle" id="toggle-login-password">
        </span>
      </div>
      <div id="login-error" class="login-error-message"></div>
      <div class="btn-submit-container">
        <button type="submit" class="btn btn-primary">ログイン</button>
      </div>
      <div class="toggle-auth">
        アカウントをお持ちでないですか？ <a id="show-register">新規登録</a>
      </div>
    </form>

    <!-- 新規登録フォーム -->
    <form id="register-form" class="login-form" style="display: none;">
      <div class="form-group">
        <label for="reg-email">メールアドレス</label>
        <input type="email" id="reg-email" class="form-input" placeholder="user@example.com" required autocomplete="email" maxlength="255">
      </div>
      <div class="form-group">
        <label for="reg-password">パスワード</label>
        <input type="password" id="reg-password" class="form-input" placeholder="8文字以上" required autocomplete="new-password" minlength="8" maxlength="128">
        <span class="password-toggle" id="toggle-reg-password"></span>
        </span>
        <div class="password-strength" id="register-password-strength">
          <span>強度: <strong id="register-password-strength-label">なし</strong></span>
          <div class="password-strength-bar"><div class="password-strength-fill" id="register-password-strength-fill"></div></div>
        </div>
      </div>
      <div id="register-error" class="login-error-message"></div>
      <div class="btn-submit-container">
        <button type="submit" class="btn btn-primary">アカウント作成</button>
      </div>
      <div class="toggle-auth">
        既にアカウントをお持ちですか？ <a id="show-login">ログイン</a>
      </div>
    </form>

    <div class="login-footer">
      <p>メールアドレスとパスワード（8文字以上）で新規登録できます</p>
    </div>
  </div>
</div>

  <!-- Theme Manager -->
  <script src="../js/theme.js"></script>
  <!-- Auth Logic -->
  <script src="../js/auth.js"></script>
  <script>
  // ==========================================
  // 1. パスワード表示切り替え（完全防衛版）
  // ==========================================
  function setupPasswordToggle(toggleId, inputId) {
    const originalToggle = document.getElementById(toggleId);
    const input = document.getElementById(inputId);
    if (!input) return;

    // 元のHTML側の古いトグルは非表示にする
    if (originalToggle) {
      originalToggle.style.setProperty('display', 'none', 'important');
      originalToggle.id = toggleId + '-deprecated';
    }

    // すでに新トグルが生成済みの場合は一旦削除（重複防止）
    const exactToggleId = 'js-toggle-' + inputId;
    let toggle = document.getElementById(exactToggleId);
    if (toggle) {
      toggle.remove();
    }

    // 新しい安全なトグル要素を生成
    toggle = document.createElement('span');
    toggle.id = exactToggleId;
    // 古いCSSの巻き添えを食らわないよう、独自のクラス名を設定
    toggle.className = 'js-secure-password-toggle'; 
    
    // スタイルをコード側から強力に固定
    toggle.style.position = 'absolute';
    toggle.style.right = '13px'; // 位置を少し内側に微調整
    toggle.style.top = '65%';
    toggle.style.transform = 'translateY(-50%)';
    toggle.style.cursor = 'pointer';
    toggle.style.display = 'flex';
    toggle.style.alignItems = 'center';
    toggle.style.zIndex = '99';

    // 入力欄の直後に挿入
    if (input.parentElement) {
      input.parentElement.style.position = 'relative';
      input.parentNode.insertBefore(toggle, input.nextSibling);
    }

    // アイコン描画関数
    function renderIcon() {
      toggle.innerHTML = '';
      const icon = document.createElement('i');
      icon.setAttribute('data-lucide', input.type === 'password' ? 'eye' : 'eye-off');
      toggle.appendChild(icon);
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    }

    // 初回描画
    renderIcon();

    // クリックイベント
    toggle.onclick = function(e) {
      e.preventDefault();
      e.stopPropagation();
      input.type = input.type === 'password' ? 'text' : 'password';
      renderIcon();
    };

    // 入力・フォーカス時の消失ガード
    input.addEventListener('focus', renderIcon);
    input.addEventListener('input', function() {
      if (toggle.children.length === 0 || toggle.querySelector('svg') === null) {
        renderIcon();
      }
    });
    input.addEventListener('blur', function() {
      setTimeout(renderIcon, 50);
    });
  }

  function initPasswordToggles() {
    setupPasswordToggle('toggle-login-password', 'password');
    setupPasswordToggle('toggle-reg-password', 'reg-password');
  }

  // ==========================================
  // 2. パスワード強度メーターのロジック
  // ==========================================
  function updatePasswordStrength(inputId, labelId, fillId) {
    const input = document.getElementById(inputId);
    const label = document.getElementById(labelId);
    const fill = document.getElementById(fillId);
    if (!input || !label || !fill) return;

    const value = input.value;
    let score = 0;
    if (value.length >= 8) score++;
    if (/[A-Z]/.test(value)) score++;
    if (/[a-z]/.test(value)) score++;
    if (/[0-9]/.test(value)) score++;
    if (/[^A-Za-z0-9]/.test(value)) score++;

    const labels = ['弱い', 'やや弱い', '普通', '強い', 'とても強い'];
    const colors = ['#ef4444', '#f59e0b', '#eab308', '#22c55e', '#10b981'];
    const width = value.length === 0 ? 0 : (score / 5) * 100;

    label.textContent = value.length === 0 ? 'なし' : labels[Math.max(0, Math.min(score - 1, labels.length - 1))];
    label.style.color = value.length === 0 ? '#cbd5e1' : colors[Math.max(0, Math.min(score - 1, colors.length - 1))];
    fill.style.width = width + '%';
    fill.style.background = value.length === 0 ? 'transparent' : colors[Math.max(0, Math.min(score - 1, colors.length - 1))];
  }

  // ==========================================
  // 3. 画面イベント初期化
  // ==========================================
  document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authTitle = document.getElementById('auth-title');
    const authDesc = document.getElementById('auth-desc');

    const regPasswordInput = document.getElementById('reg-password');
    if (regPasswordInput) {
      regPasswordInput.addEventListener('input', function() {
        updatePasswordStrength('reg-password', 'register-password-strength-label', 'register-password-strength-fill');
      });
    }

    const showRegister = document.getElementById('show-register');
    if (showRegister) {
      showRegister.onclick = function() {
        if (loginForm) loginForm.style.display = 'none';
        if (registerForm) registerForm.style.display = 'block';
        if (authTitle) authTitle.textContent = '新規登録';
        if (authDesc) authDesc.textContent = '新しいアカウントを作成してください';
        initPasswordToggles();
      };
    }

    const showLogin = document.getElementById('show-login');
    if (showLogin) {
      showLogin.onclick = function() {
        if (loginForm) loginForm.style.display = 'block';
        if (registerForm) registerForm.style.display = 'none';
        if (authTitle) authTitle.textContent = 'ログイン';
        if (authDesc) authDesc.textContent = 'アカウントにログインしてください';
        initPasswordToggles();
      };
    }

    initPasswordToggles();
    setTimeout(initPasswordToggles, 100);
  });

  initPasswordToggles();
  setTimeout(initPasswordToggles, 200);
</script>
</body>
</html>
