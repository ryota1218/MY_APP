<script>
  // index.htmlを経由せず直接開かれた場合は、メイン画面へリダイレクト
  if (!window.app) window.location.href = '../index.html?tool=dashboard';

  // 現在のユーザー名を反映
  if (window.Auth && window.Auth.currentUser) {
    document.getElementById('dashboard-user-name').textContent = window.Auth.currentUser.name;
  }
</script>
<link rel="stylesheet" href="css/dashboard.css">
<!-- Dashboard -->
<div class="section-header">
  <div class="welcome-message">
    <h1>おかえりなさい、<span id="dashboard-user-name">ゲスト</span>さん</h1>
  </div>
</div>
<div class="dashboard-layout">
  <!-- 1. プロジェクト名エリア（上段左寄り） -->
  <div class="dashboard-row top">
    <div class="project-info-badge" id="dashboard-project-badge" style="cursor: pointer;" onclick="window.app.navigateTo('project')" title="プロジェクト管理を開く">
      <i data-lucide="folder-kanban" class="icon-sm"></i>
      <span class="label">プロジェクト:</span>
      <span id="current-project-display">未選択</span>
    </div>
  </div>

  <!-- 2 & 3. 中段エリア -->
  <div class="dashboard-row middle">
    <!-- ガントチャート -->
    <div class="card gantt-preview-block" onclick="window.app.navigateTo('gantt')" title="ガントチャートを開く">
      <div class="block-header">
        <h3>ガントチャート</h3>
      </div>
      <div id="dashboard-gantt-preview" class="gantt-mini-view">
        <!-- スケジュール概要が表示されます -->
      </div>
    </div>
  </div>

  <!-- 4. 作成した図（下段） -->
  <div class="card main-diagrams-block">
    <div class="block-header">
      <h2>作成した図</h2>
      <button class="btn btn-sm btn-secondary" id="diagram-filter-btn">
        <i data-lucide="filter"></i> フィルタ
      </button>
    </div>
    
    <!-- テーブルビュー -->
    <div class="dashboard-table-container" style="overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); margin-top: 10px;">
      <table class="dashboard-table" style="width: 100%; border-collapse: collapse; text-align: left; background: var(--bg-card); font-size: 0.9rem;">
        <thead>
          <tr style="border-bottom: 2px solid var(--border); background: rgba(0,0,0,0.12);">
            <th style="padding: 12px 16px; font-weight: 600; color: var(--text);">タイトル (name)</th>
            <th style="padding: 12px 16px; font-weight: 600; color: var(--text);">図の種類 (chart_type)</th>
            <th style="padding: 12px 16px; font-weight: 600; color: var(--text);">状態 (stats)</th>
            <th style="padding: 12px 16px; font-weight: 600; color: var(--text);">更新日時 (update_att)</th>
          </tr>
        </thead>
        <tbody id="dashboard-table-body">
          <!-- ここに動的にテーブル行が生成されます -->
        </tbody>
      </table>
    </div>
  </div>
</div>
